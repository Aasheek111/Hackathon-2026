<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pragya — Empowering Every Mind with Adaptive AI Learning" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Pragya — Empowering Every Mind</title>
    <style>
      /* Complete suppression of Google Translate top banner, iframe & popups across all browsers */
      iframe.goog-te-banner-frame,
      .goog-te-banner-frame,
      body > .skiptranslate,
      iframe.skiptranslate,
      #goog-gt-tt,
      .goog-te-balloon-frame,
      .VIpgJd-ZVi9od-ORVhHd-as205b,
      .VIpgJd-yA084b-y0fZUd-hsrBo,
      .goog-te-spinner-pos {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        width: 0 !important;
        height: 0 !important;
        pointer-events: none !important;
      }

      body {
        top: 0px !important;
        position: static !important;
      }

      .goog-te-gadget {
        color: transparent !important;
        font-size: 0 !important;
      }

      .goog-tooltip,
      .goog-tooltip:hover {
        display: none !important;
      }

      .goog-text-highlight {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body class="bg-[#FAF9F5] text-slate-800 font-sans antialiased overflow-x-hidden">
    <div id="google_translate_element" style="display:none"></div>
    <div id="root"></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,ne',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
