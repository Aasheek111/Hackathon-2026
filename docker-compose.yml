services:
  # Node.js Backend API
  # Uses Prisma's SQLite provider (see backend/prisma/schema.prisma) - the file
  # lives inside the bind-mounted ./backend volume below, so it persists on the
  # host exactly like the native `npm run dev` flow, no separate DB container.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neurolearn_backend
    restart: unless-stopped
    # --legacy-watch: file-change events from a Windows bind mount don't
    # reliably reach nodemon's default watcher, so it polls instead.
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx nodemon --legacy-watch --exec tsx src/index.ts"
    environment:
      DATABASE_URL: file:./dev.db
      JWT_SECRET: super_secret_jwt_key_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      FRONTEND_URL: http://localhost:5173
      CV_SERVICE_URL: http://cv-service:8000
      RAG_SERVICE_URL: http://rag-service:8100
      # Shared secret for service-to-service calls (the celery-worker container
      # calling back into /internal/* routes) - not a real external credential,
      # so hardcoded here exactly like JWT_SECRET above.
      INTERNAL_API_SECRET: neurolearn_internal_dev_secret_change_in_production
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Python CV Microservice
  cv-service:
    build:
      context: ./cv-service
      dockerfile: Dockerfile
    container_name: neurolearn_cv
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      HOST: 0.0.0.0

  # Redis - message broker + result backend for the Celery background job
  # queue that runs full-curriculum tutorial generation, YouTube quiz
  # generation, and TTS (see rag-service/app/celery_app.py).
  redis:
    image: redis:7-alpine
    container_name: neurolearn_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # Python RAG Microservice (syllabus ingestion + tutorial generation)
  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: neurolearn_rag
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8100:8100"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      BACKEND_INTERNAL_URL: http://backend:5000
      INTERNAL_API_SECRET: neurolearn_internal_dev_secret_change_in_production
    volumes:
      - rag_uploads:/app/uploads
      - rag_vector_store:/app/vector_store

  # Celery worker - executes the background jobs rag-service enqueues. Same
  # image/code as rag-service (see rag-service/Dockerfile), just a different
  # command and no exposed HTTP port. Shares the same volumes so it can read
  # uploaded PDFs and write generated images/vector indexes that rag-service
  # serves back out over HTTP.
  celery-worker:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: neurolearn_celery_worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - redis
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      BACKEND_INTERNAL_URL: http://backend:5000
      INTERNAL_API_SECRET: neurolearn_internal_dev_secret_change_in_production
    volumes:
      - rag_uploads:/app/uploads
      - rag_vector_store:/app/vector_store

  # React Frontend (dev mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: neurolearn_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5001/api
      VITE_CV_SERVICE_URL: http://localhost:8000
      VITE_RAG_SERVICE_URL: http://localhost:8100
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  rag_uploads:
  rag_vector_store:
