services:
  # Node.js Backend API
  # Uses Prisma's SQLite provider (see backend/prisma/schema.prisma) - the file
  # lives inside the bind-mounted ./backend volume below, so it persists on the
  # host exactly like the native `npm run dev` flow, no separate DB container.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neurolearn_backend
    restart: unless-stopped
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"
    environment:
      DATABASE_URL: file:./dev.db
      JWT_SECRET: super_secret_jwt_key_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      FRONTEND_URL: http://localhost:5173
      CV_SERVICE_URL: http://cv-service:8000
      RAG_SERVICE_URL: http://rag-service:8100
    ports:
      - '5000:5000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Python CV Microservice
  cv-service:
    build:
      context: ./cv-service
      dockerfile: Dockerfile
    container_name: neurolearn_cv
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      PORT: 8000
      HOST: 0.0.0.0

  # Python RAG Microservice (syllabus ingestion + tutorial generation)
  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: neurolearn_rag
    restart: unless-stopped
    ports:
      - '8100:8100'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - rag_uploads:/app/uploads
      - rag_vector_store:/app/vector_store

  # React Frontend (dev mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: neurolearn_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_CV_SERVICE_URL: http://localhost:8000
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  rag_uploads:
  rag_vector_store:
