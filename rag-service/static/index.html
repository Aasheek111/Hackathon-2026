<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeuroLearn — RAG service</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --surface: #fff;
        --ink: #14202b;
        --muted: #5b6b7a;
        --edge: #d8e0e8;
        --accent: #17607a;
        --good: #14663f;
        --bad: #9b2c2c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 2rem 1rem 4rem;
        background: var(--bg);
        color: var(--ink);
        font: 16px/1.6 system-ui, "Segoe UI", Roboto, sans-serif;
      }
      main { max-width: 60rem; margin: 0 auto; }
      h1 { margin: 0 0 .25rem; letter-spacing: -.02em; }
      .sub { color: var(--muted); margin: 0 0 2rem; }
      .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(18rem, 1fr)); }
      .card {
        background: var(--surface);
        border: 1px solid var(--edge);
        border-radius: 14px;
        padding: 1.25rem;
      }
      h2 { margin: 0 0 .75rem; font-size: 1.15rem; }
      label { display: block; font-weight: 600; margin: .75rem 0 .25rem; font-size: .95rem; }
      input, textarea, select, button {
        font: inherit;
        width: 100%;
        padding: .6rem .75rem;
        border: 1px solid var(--edge);
        border-radius: 9px;
        background: #fff;
        color: inherit;
      }
      button {
        margin-top: 1rem;
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled { opacity: .6; cursor: progress; }
      .status { margin-top: .75rem; font-size: .95rem; min-height: 1.4rem; }
      .status.ok { color: var(--good); }
      .status.bad { color: var(--bad); }
      .wide { margin-top: 1rem; }
      pre {
        background: #0f172a;
        color: #e2e8f0;
        padding: 1rem;
        border-radius: 12px;
        overflow-x: auto;
        font-size: .85rem;
      }
      .result h3 { margin: 1.25rem 0 .35rem; font-size: 1rem; text-transform: uppercase;
                   letter-spacing: .06em; color: var(--muted); }
      .quiz li { margin-bottom: .6rem; }
      .pill {
        display: inline-block; padding: .1rem .55rem; border-radius: 999px;
        background: #e6f0f4; color: var(--accent); font-size: .8rem; font-weight: 700;
      }
      .thumbs { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .75rem; }
      .thumbs img { height: 76px; border-radius: 8px; border: 1px solid var(--edge); }
    </style>
  </head>
  <body>
    <main>
      <h1>NeuroLearn — RAG service</h1>
      <p class="sub">
        Upload a unit PDF, then generate a tutorial adapted to one student <em>and</em> to the
        learning mode the platform has switched them into.
        <span id="health" class="pill">checking…</span>
      </p>

      <div class="grid">
        <section class="card">
          <h2>1. Upload a unit PDF</h2>
          <form id="pdf-form">
            <label for="pdf-unit">Unit ID</label>
            <input id="pdf-unit" type="number" min="1" value="1" required />
            <label for="pdf-file">PDF file</label>
            <input id="pdf-file" type="file" accept="application/pdf" required />
            <button type="submit">Upload &amp; index</button>
          </form>
          <p id="pdf-status" class="status"></p>
        </section>

        <section class="card">
          <h2>2. Upload an image (optional)</h2>
          <form id="img-form">
            <label for="img-unit">Unit ID</label>
            <input id="img-unit" type="number" min="1" value="1" required />
            <label for="img-file">Image file</label>
            <input id="img-file" type="file" accept="image/*" required />
            <button type="submit">Upload image</button>
          </form>
          <p id="img-status" class="status"></p>
          <div id="thumbs" class="thumbs"></div>
        </section>
      </div>

      <section class="card wide">
        <h2>3. Generate a tutorial</h2>
        <label for="gen-unit">Unit ID</label>
        <input id="gen-unit" type="number" min="1" value="1" required />
        <label for="diagnosis">Student diagnosis (optional)</label>
        <textarea id="diagnosis" rows="2"
          placeholder="e.g. Struggling with fractions, reads slowly"></textarea>
        <button id="gen-btn" type="button">Generate tutorial</button>
        <p id="gen-status" class="status"></p>
        <div id="result" class="result"></div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const say = (el, message, ok) => {
        el.textContent = message;
        el.className = "status " + (ok === undefined ? "" : ok ? "ok" : "bad");
      };

      // read the error body the API sends, whichever shape it used
      async function problem(response) {
        try {
          const body = await response.json();
          return body.detail || body.error || JSON.stringify(body);
        } catch {
          return `HTTP ${response.status}`;
        }
      }

      async function refreshHealth() {
        try {
          const data = await (await fetch("/health")).json();
          const units = data.processed_units.length
            ? `units ready: ${data.processed_units.join(", ")}`
            : "no units indexed yet";
          $("health").textContent = data.ai_key_configured
            ? units
            : "GOOGLE_API_KEY not set";
        } catch {
          $("health").textContent = "backend unreachable";
        }
      }

      $("pdf-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const button = event.target.querySelector("button");
        const body = new FormData();
        body.append("unit_id", $("pdf-unit").value);
        body.append("file", $("pdf-file").files[0]);

        button.disabled = true;
        say($("pdf-status"), "Uploading and indexing… this can take a few seconds.");
        try {
          const response = await fetch("/upload-pdf", { method: "POST", body });
          if (!response.ok) throw new Error(await problem(response));
          const data = await response.json();
          say($("pdf-status"), `Indexed unit ${data.unit_id} — ${data.chunks} chunks.`, true);
          refreshHealth();
        } catch (failure) {
          say($("pdf-status"), failure.message, false);
        } finally {
          button.disabled = false;
        }
      });

      $("img-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const button = event.target.querySelector("button");
        const body = new FormData();
        body.append("unit_id", $("img-unit").value);
        body.append("file", $("img-file").files[0]);

        button.disabled = true;
        say($("img-status"), "Uploading…");
        try {
          const response = await fetch("/upload-image", { method: "POST", body });
          if (!response.ok) throw new Error(await problem(response));
          const data = await response.json();
          say($("img-status"), "Saved.", true);
          const img = document.createElement("img");
          img.src = data.image_url;
          img.alt = "Uploaded unit image";
          $("thumbs").append(img);
        } catch (failure) {
          say($("img-status"), failure.message, false);
        } finally {
          button.disabled = false;
        }
      });

      $("gen-btn").addEventListener("click", async () => {
        const button = $("gen-btn");
        button.disabled = true;
        $("result").innerHTML = "";
        say($("gen-status"), "Thinking…");

        try {
          const response = await fetch("/generate-tutorial", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              unit_id: Number($("gen-unit").value),
              student_diagnosis: $("diagnosis").value.trim() || null,
              learning_mode: $("mode").value,
            }),
          });
          if (!response.ok) throw new Error(await problem(response));
          const data = await response.json();
          say(
            $("gen-status"),
            `Done — ${data.learning_mode} mode, built from ${data.source_chunks} chunks.` +
              (data.offline ? "  ⚠ OFFLINE MODE: no API key, so this was extracted, not generated." : ""),
            true
          );
          render(data);
        } catch (failure) {
          say($("gen-status"), failure.message, false);
        } finally {
          button.disabled = false;
        }
      });

      function render(data) {
        const escape = (value) =>
          String(value).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

        const quiz = (data.quiz || [])
          .map(
            (item) => `<li><strong>${escape(item.question)}</strong><br>
              ${(item.options || []).map(escape).join(" &nbsp;·&nbsp; ")}
              <br><em>Answer: ${escape(item.correct)}</em></li>`
          )
          .join("");

        $("result").innerHTML = `
          <h3>Tutorial</h3><p>${escape(data.tutorial_text)}</p>
          <h3>Audio script</h3><p>${escape(data.audio_script)}</p>
          <h3>Visual suggestion</h3><p>${escape(data.visual_suggestion)}</p>
          <h3>Quiz</h3><ul class="quiz">${quiz || "<li>none returned</li>"}</ul>
          <h3>Teacher note</h3><p>${escape(data.teacher_note)}</p>
          <h3>Raw JSON</h3><pre>${escape(JSON.stringify(data, null, 2))}</pre>`;
      }

      refreshHealth();
    </script>
  </body>
</html>
